version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: fasotravel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fasotravel}
      POSTGRES_USER: ${DB_USER:-fasotravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fasotravel_dev_2026}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-fasotravel}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fasotravel_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: fasotravel_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
